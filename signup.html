<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - AttendTrack</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100">
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
<div class="max-w-md w-full space-y-8">
<div class="bg-white rounded-xl shadow-md p-8">
    <div class="text-center">
    <img
        src="https://cdn-icons-png.flaticon.com/512/3068/3068641.png"
        alt="AttendTrack Logo"
        class="mx-auto h-16 w-16 rounded-full object-cover">
    <h2 class="mt-4 text-3xl font-extrabold text-gray-900">
        Create Your Account
    </h2>
    <p class="mt-2 text-sm text-gray-600">
        Sign up to access your personalized attendance dashboard
    </p>
    </div>
    
    <form id="signupForm" class="mt-8 space-y-6">
    <div class="rounded-md space-y-4">
        <div>
        <label for="fullName" class="block text-sm font-medium text-gray-700 mb-1">
            Full Name
        </label>
        <input
            id="fullName"
            name="fullName"
            type="text"
            required
            class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-green-500 focus:border-green-500 focus:z-10 sm:text-sm"
            placeholder="John Doe">
        </div>
        
        <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
            Email Address
        </label>
        <input
            id="email"
            name="email"
            type="email"
            required
            class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-green-500 focus:border-green-500 focus:z-10 sm:text-sm"
            placeholder="john@example.com">
        </div>
        
        <div>
        <label for="regNumber" class="block text-sm font-medium text-gray-700 mb-1">
            Registration Number
        </label>
        <input
            id="regNumber"
            name="regNumber"
            type="text"
            required
            class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-green-500 focus:border-green-500 focus:z-10 sm:text-sm"
            placeholder="STU12345">
        </div>
        
        <div>
        <label for="signupUsername" class="block text-sm font-medium text-gray-700 mb-1">
            Username
        </label>
        <input
            id="signupUsername"
            name="username"
            type="text"
            required
            class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-green-500 focus:border-green-500 focus:z-10 sm:text-sm"
            placeholder="username">
        </div>
        
        <div>
        <label for="signupPassword" class="block text-sm font-medium text-gray-700 mb-1">
            Password
        </label>
        <input
            id="signupPassword"
            name="password"
            type="password"
            required
            class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-green-500 focus:border-green-500 focus:z-10 sm:text-sm"
            placeholder="Password">
        </div>
        
        <div>
        <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">
            Confirm Password
        </label>
        <input
            id="confirmPassword"
            name="confirmPassword"
            type="password"
            required
            class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-green-500 focus:border-green-500 focus:z-10 sm:text-sm"
            placeholder="Confirm Password">
        </div>
    </div>

    <div>
        <button type="submit" class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
        Sign Up
        </button>
    </div>
    </form>
    
    <div class="text-center mt-4">
    <p class="text-sm text-gray-600">
        Already have an account?
        <a href="index.html" class="font-medium text-green-600 hover:text-green-500">
        Sign in
        </a>
    </p>
    </div>
</div>
</div>
</div>

<script>
// Handle signup form submission
document.getElementById('signupForm').addEventListener('submit', function(e) {
e.preventDefault();

const fullName = document.getElementById('fullName').value;
const email = document.getElementById('email').value;
const regNumber = document.getElementById('regNumber').value;
const username = document.getElementById('signupUsername').value;
const password = document.getElementById('signupPassword').value;
const confirmPassword = document.getElementById('confirmPassword').value;

// Validate passwords match
if (password !== confirmPassword) {
alert('Passwords do not match. Please try again.');
return;
}

// Get existing users from localStorage or initialize empty array
const users = JSON.parse(localStorage.getItem('attendtrack_users')) || [];

// Check if username already exists
const existingUser = users.find(user => user.username === username);
if (existingUser) {
alert('Username already exists. Please choose a different username.');
return;
}

// Create new user object
const newUser = {
fullName: fullName,
email: email,
regNumber: regNumber,
username: username,
password: password // In a real app, this should be hashed
};

// Add new user to users array
users.push(newUser);

// Save updated users array to localStorage
localStorage.setItem('attendtrack_users', JSON.stringify(users));

// Show success message and redirect to login
alert('Account created successfully! You can now log in.');
window.location.href = 'index.html';
});
</script>
</body>
</html>
